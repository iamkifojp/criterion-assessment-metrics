<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Troubleshoot CAM</title><desc id="desc">Start the troubleshooting launcher, read the log, or reconnect the data folder.</desc><rect width="1200" height="420" rx="22" fill="#f7f9fa"/>
  <g font-family="Segoe UI,Arial,sans-serif" fill="#233044"><g transform="translate(35 55)"><rect width="350" height="310" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><rect x="25" y="28" width="300" height="98" rx="9" fill="#24384a"/><text x="175" y="68" text-anchor="middle" font-size="17" fill="#fff">Start CAM</text><text x="175" y="96" text-anchor="middle" font-size="17" fill="#fff">(troubleshooting).bat</text><text x="25" y="172" font-size="23" font-weight="700" fill="#1e4f70">CAM will not start</text><text x="25" y="211" font-size="17" fill="#607080">Run the visible launcher.</text><text x="25" y="242" font-size="17" fill="#607080">Leave its window open.</text></g>
  <g transform="translate(425 55)"><rect width="350" height="310" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><path d="M49 33h95l17 20h141v90H49z" fill="#dceaf0" stroke="#4e8891" stroke-width="3"/><text x="175" y="91" text-anchor="middle" font-size="19" font-weight="700">logs\cam.log</text><text x="25" y="190" font-size="23" font-weight="700" fill="#1e4f70">Read the latest clue</text><text x="25" y="229" font-size="17" fill="#607080">Close another CAM window</text><text x="25" y="260" font-size="17" fill="#607080">if port 8600 is busy.</text></g>
  <g transform="translate(815 55)"><rect width="350" height="310" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><path d="M49 33h95l17 20h141v90H49z" fill="#f1d9a9" stroke="#c79c4b" stroke-width="3"/><text x="175" y="91" text-anchor="middle" font-size="19" font-weight="700">Existing CAM Data</text><text x="25" y="190" font-size="23" font-weight="700" fill="#1e4f70">Reconnect your data</text><text x="25" y="229" font-size="17" fill="#607080">Use Browse... and load</text><text x="25" y="260" font-size="17" fill="#607080">the existing database.</text></g></g>
</svg>
