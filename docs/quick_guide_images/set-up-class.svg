<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Set up a class</title><desc id="desc">The class form leads to a checked roster and criteria A to D.</desc>
  <rect width="1200" height="420" rx="22" fill="#f7f9fa"/>
  <g font-family="Segoe UI,Arial,sans-serif" fill="#233044">
    <rect x="35" y="30" width="565" height="350" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><rect x="35" y="30" width="565" height="58" rx="16" fill="#1e4f70"/><text x="64" y="68" font-size="25" font-weight="700" fill="#fff">Add / Edit class</text>
    <text x="66" y="128" font-size="17" fill="#607080">Class name</text><rect x="66" y="141" width="500" height="48" rx="7" fill="#fff" stroke="#9fb0bb" stroke-width="2"/><text x="84" y="172" font-size="20">Year 8 Art</text>
    <text x="66" y="224" font-size="17" fill="#607080">Master directory</text><rect x="66" y="237" width="378" height="48" rx="7" fill="#fff" stroke="#9fb0bb" stroke-width="2"/><text x="84" y="268" font-size="17">Documents\Y8 Art</text><rect x="454" y="237" width="112" height="48" rx="7" fill="#edf2f5" stroke="#9fb0bb" stroke-width="2"/><text x="510" y="268" text-anchor="middle" font-size="18">Browse...</text>
    <rect x="66" y="315" width="500" height="44" rx="7" fill="#b24d45"/><text x="316" y="344" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">Create class</text>
    <rect x="635" y="30" width="530" height="350" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><text x="670" y="76" font-size="24" font-weight="700" fill="#1e4f70">Roster and criteria</text>
    <g font-size="19"><circle cx="687" cy="126" r="13" fill="#4e8891"/><path d="M680 126l5 6 10-13" fill="none" stroke="#fff" stroke-width="3"/><text x="715" y="133">Aiko Tanaka</text><circle cx="687" cy="177" r="13" fill="#4e8891"/><path d="M680 177l5 6 10-13" fill="none" stroke="#fff" stroke-width="3"/><text x="715" y="184">Haru Sato</text><circle cx="687" cy="228" r="13" fill="#4e8891"/><path d="M680 228l5 6 10-13" fill="none" stroke="#fff" stroke-width="3"/><text x="715" y="235">Mei Suzuki</text></g>
