<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Add an assignment and enter marks</title><desc id="desc">Create an assignment, choose a student, and enter a mark.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4e8891"/></marker></defs><rect width="1200" height="420" rx="22" fill="#f7f9fa"/>
  <g font-family="Segoe UI,Arial,sans-serif" fill="#233044"><rect x="35" y="45" width="330" height="330" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><text x="62" y="87" font-size="23" font-weight="700" fill="#1e4f70">1. Create</text><text x="62" y="127" font-size="16" fill="#607080">Name</text><rect x="62" y="140" width="276" height="42" rx="7" fill="#fff" stroke="#9fb0bb" stroke-width="2"/><text x="78" y="168" font-size="18">Perspective task</text><text x="62" y="215" font-size="16" fill="#607080">Type</text><rect x="62" y="228" width="132" height="39" rx="19" fill="#dceaf0"/><text x="128" y="254" text-anchor="middle" font-size="17" font-weight="700">Assignment</text><text x="62" y="304" font-size="17">Criterion C</text><rect x="62" y="325" width="276" height="34" rx="7" fill="#b24d45"/><text x="200" y="348" text-anchor="middle" font-size="17" fill="#fff" font-weight="700">Create</text>
  <path d="M385 212h65" stroke="#4e8891" stroke-width="5" marker-end="url(#a)"/><rect x="465" y="45" width="260" height="330" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><text x="492" y="87" font-size="23" font-weight="700" fill="#1e4f70">2. Choose</text><g font-size="18"><rect x="492" y="120" width="206" height="54" rx="9" fill="#dceaf0"/><text x="510" y="153" font-weight="700">Aiko Tanaka</text><rect x="492" y="187" width="206" height="54" rx="9" fill="#f4f6f7"/><text x="510" y="220">Haru Sato</text><rect x="492" y="254" width="206" height="54" rx="9" fill="#f4f6f7"/><text x="510" y="287">Mei Suzuki</text></g>
  <path d="M745 212h65" stroke="#4e8891" stroke-width="5" marker-end="url(#a)"/><rect x="825" y="45" width="340" height="330" rx="16" fill="#fff" stroke="#d3dce2" stroke-width="3"/><text x="852" y="87" font-size="23" font-weight="700" fill="#1e4f70">3. Enter mark</text><text x="852" y="132" font-size="18" font-weight="700">Perspective task</text><text x="852" y="168" font-size="16" fill="#607080">Criterion C mark (0-8)</text><rect x="852" y="183" width="112" height="70" rx="10" fill="#fff" stroke="#b24d45" stroke-width="3"/><text x="908" y="231" text-anchor="middle" font-size="38" font-weight="700" fill="#b24d45">6</text><text x="852" y="291" font-size="16" fill="#607080">Note</text><rect x="852" y="304" width="286" height="48" rx="7" fill="#fff" stroke="#9fb0bb" stroke-width="2"/><text x="868" y="334" font-size="16">Strong composition</text></g>
